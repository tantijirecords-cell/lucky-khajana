<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  transition:0.5s;
}

/* Splash */
#splash{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:30px;
  z-index:999;
}

/* Box */
.box{
  max-width:400px;
  margin:20px auto;
  padding:20px;
  background:rgba(0,0,0,0.6);
  border-radius:15px;
}

/* Inputs */
input,button{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:8px;
}

button{
  background:#00c6ff;
  color:white;
  font-weight:bold;
}

/* Grid */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.card{
  background:rgba(255,255,255,0.1);
  padding:10px;
  border-radius:10px;
  text-align:center;
}

/* Msg */
#msg{
  position:fixed;
  top:20px;
  right:20px;
  background:green;
  padding:10px;
  display:none;
  border-radius:8px;
}
</style>
</head>

<body style="background:linear-gradient(45deg,#0f2027,#2c5364)">

<div id="splash">🎮 GAME ADMIN</div>

<!-- LOGIN -->
<div class="box" id="login" style="display:none">
  <h2>Admin Login</h2>
  <input id="user" placeholder="User ID">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- PANEL -->
<div class="box" id="panel" style="display:none">

<h2>Dashboard</h2>

<div class="grid">
  <div class="card">Today Deposit<br><span>0</span></div>
  <div class="card">Today Withdraw<br><span>0</span></div>
  <div class="card">Today Profit<br><span>0</span></div>

  <div class="card">Pending Deposit<br><span>-</span></div>
  <div class="card">Pending Withdraw<br><span>-</span></div>
</div>

<hr>

<h3>Pending Requests</h3>
<button onclick="showPendingDeposit()">Pending Deposit</button>
<button onclick="showPendingWithdraw()">Pending Withdraw</button>
<div id="pendingList"></div>

<hr>

<h3>User Control</h3>
<input id="uid" placeholder="User ID">
<input id="amount" placeholder="Amount">

<button onclick="add()">Add Balance</button>
<button onclick="cut()">Cut Balance</button>
<button onclick="searchUser()">Search User</button>

<hr>

<h3>Bonus System</h3>
<input id="bonusAmt" placeholder="Bonus Amount">

<button onclick="sendBonus()">Send Bonus</button>
<button onclick="quickBonus(100)">Festival Bonus</button>
<button onclick="quickBonus(50)">Event Bonus</button>

<hr>

<h3>Theme</h3>
<button onclick="theme1()">Blue</button>
<button onclick="theme2()">Red</button>
<button onclick="theme3()">Green</button>

<input type="file" onchange="bgUpload(event)">

<button onclick="logout()">Logout</button>

</div>

<div id="msg"></div>

<script>

// Splash
setTimeout(()=>{
  splash.style.display="none";
  login.style.display="block";
},2000);

// Login
let ADMIN_USER="8252312053";
let ADMIN_PASS="Vikash209@";

function login(){
  let u=user.value.trim();
  let p=pass.value.trim();

  if(u!==ADMIN_USER){
    show("Wrong ID ❌"); return;
  }
  if(p!==ADMIN_PASS){
    show("Wrong Password ❌"); return;
  }

  login.style.display="none";
  panel.style.display="block";
  show("Login Success ✅");
}

// Users
function getUsers(){
  return JSON.parse(localStorage.getItem("users"))||{};
}
function saveUsers(d){
  localStorage.setItem("users",JSON.stringify(d));
}

// Pending
function getPending(){
  return JSON.parse(localStorage.getItem("pending"))||{deposit:[],withdraw:[]};
}
function savePending(d){
  localStorage.setItem("pending",JSON.stringify(d));
}

// Show Pending Deposit
function showPendingDeposit(){
  let data=getPending();
  let html="<h4>Deposit List</h4>";

  data.deposit.forEach((x,i)=>{
    html+=`
    <div style="background:#222;padding:10px;margin:5px">
    ID:${x.id}<br>Amount:${x.amount}<br>
    <button onclick="acceptDeposit(${i})">Accept</button>
    <button onclick="rejectDeposit(${i})">Reject</button>
    </div>`;
  });

  pendingList.innerHTML=html;
}

// Show Pending Withdraw
function showPendingWithdraw(){
  let data=getPending();
  let html="<h4>Withdraw List</h4>";

  data.withdraw.forEach((x,i)=>{
    html+=`
    <div style="background:#222;padding:10px;margin:5px">
    ID:${x.id}<br>Amount:${x.amount}<br>
    <button onclick="acceptWithdraw(${i})">Accept</button>
    <button onclick="rejectWithdraw(${i})">Reject</button>
    </div>`;
  });

  pendingList.innerHTML=html;
}

// Accept/Reject
function acceptDeposit(i){
  let p=getPending(),u=getUsers();
  let r=p.deposit[i];

  if(!u[r.id]) u[r.id]={balance:0};
  u[r.id].balance+=r.amount;

  p.deposit.splice(i,1);
  saveUsers(u); savePending(p);
  show("Deposit Accepted ✅");
  showPendingDeposit();
}

function rejectDeposit(i){
  let p=getPending();
  p.deposit.splice(i,1);
  savePending(p);
  show("Rejected ❌");
  showPendingDeposit();
}

function acceptWithdraw(i){
  let p=getPending(),u=getUsers();
  let r=p.withdraw[i];

  if(!u[r.id]) return show("User not found");

  u[r.id].balance-=r.amount;

  p.withdraw.splice(i,1);
  saveUsers(u); savePending(p);
  show("Withdraw Done ✅");
  showPendingWithdraw();
}

function rejectWithdraw(i){
  let p=getPending();
  p.withdraw.splice(i,1);
  savePending(p);
  show("Rejected ❌");
  showPendingWithdraw();
}

// Balance
function add(){
  let u=getUsers(),id=uid.value,amt=parseInt(amount.value);
  if(!u[id]) u[id]={balance:0};
  u[id].balance+=amt;
  saveUsers(u);
  show("Added ✅");
}

function cut(){
  let u=getUsers(),id=uid.value,amt=parseInt(amount.value);
  if(!u[id]) return show("Not found");
  u[id].balance-=amt;
  saveUsers(u);
  show("Cut ❌");
}

function searchUser(){
  let u=getUsers();
  if(u[uid.value]) show("Balance: "+u[uid.value].balance);
  else show("Not found");
}

// Bonus
function sendBonus(){
  let u=getUsers(),id=uid.value,amt=parseInt(bonusAmt.value);
  if(!u[id]) u[id]={balance:0};
  u[id].balance+=amt;
  saveUsers(u);
  show("Bonus Sent 💰");
}

function quickBonus(x){
  bonusAmt.value=x;
  sendBonus();
}

// Theme
function theme1(){document.body.style.background="linear-gradient(45deg,#0f2027,#2c5364)"}
function theme2(){document.body.style.background="linear-gradient(45deg,#ff512f,#dd2476)"}
function theme3(){document.body.style.background="linear-gradient(45deg,#1d976c,#93f9b9)"}

// BG Upload
function bgUpload(e){
  let r=new FileReader();
  r.onload=()=>{document.body.style.background=`url(${r.result})`;};
  r.readAsDataURL(e.target.files[0]);
}

// Logout
function logout(){location.reload();}

// Msg
function show(t){
  msg.innerText=t;
  msg.style.display="block";
  setTimeout(()=>msg.style.display="none",5000);
}

</script>

</body>
</html>
