<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Advanced Admin Panel</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  transition:0.5s;
}

/* Splash Screen */
#splash{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:30px;
  font-weight:bold;
  z-index:999;
}

/* Container */
.box{
  max-width:400px;
  margin:20px auto;
  padding:20px;
  background:rgba(0,0,0,0.6);
  border-radius:15px;
}

/* Inputs */
input,button{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:8px;
}

button{
  background:#00c6ff;
  color:white;
  font-weight:bold;
}

/* Dashboard Grid */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.card{
  background:rgba(255,255,255,0.1);
  padding:10px;
  border-radius:10px;
  text-align:center;
}

/* Message */
#msg{
  position:fixed;
  top:20px;
  right:20px;
  background:green;
  padding:10px;
  display:none;
  border-radius:8px;
}
</style>
</head>

<body style="background:linear-gradient(45deg,#0f2027,#2c5364)">

<div id="splash">🎮 GAME ADMIN</div>

<!-- LOGIN -->
<div class="box" id="login" style="display:none">
  <h2>Admin Login</h2>
  <input id="user" placeholder="User ID">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- PANEL -->
<div class="box" id="panel" style="display:none">

<h2>Dashboard</h2>

<div class="grid">
  <div class="card">Today Deposit<br><span id="td">0</span></div>
  <div class="card">Today Withdraw<br><span id="tw">0</span></div>
  <div class="card">Today Profit<br><span id="tp">0</span></div>

  <div class="card">Yesterday Deposit<br><span>0</span></div>
  <div class="card">Yesterday Withdraw<br><span>0</span></div>

  <div class="card">Pending Deposit<br><span>0</span></div>
  <div class="card">Pending Withdraw<br><span>0</span></div>

  <div class="card">Weekly Deposit<br><span>0</span></div>
  <div class="card">Weekly Withdraw<br><span>0</span></div>

  <div class="card">Monthly Deposit<br><span>0</span></div>
  <div class="card">Monthly Withdraw<br><span>0</span></div>
</div>

<hr>

<h3>User Control</h3>
<input id="uid" placeholder="User ID">
<input id="amount" placeholder="Amount">

<button onclick="add()">Add Balance</button>
<button onclick="cut()">Cut Balance</button>
<button onclick="search()">Search User</button>

<hr>

<h3>Bonus System</h3>
<input id="bonusAmt" placeholder="Bonus Amount">
<input id="bonusMsg" placeholder="Message">

<button onclick="sendBonus()">Send Bonus</button>
<button onclick="quickBonus(100)">Festival Bonus</button>
<button onclick="quickBonus(50)">Event Bonus</button>
<button onclick="quickBonus(30)">Promotion Bonus</button>

<hr>

<h3>Theme</h3>
<button onclick="theme1()">Blue</button>
<button onclick="theme2()">Red</button>
<button onclick="theme3()">Green</button>

<input type="file" onchange="bgUpload(event)">

<button onclick="logout()">Logout</button>

</div>

<div id="msg"></div>

<script>

// SPLASH
setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  document.getElementById("login").style.display="block";
},2000);

// LOGIN
let ADMIN_USER="8252312053";
let ADMIN_PASS="Vikash209@";

function login(){
  let u=user.value;
  let p=pass.value;

  if(u===ADMIN_USER && p===ADMIN_PASS){
    login.style.display="none";
    panel.style.display="block";
    show("Login Success ✅");
  }else{
    show("Wrong Login ❌");
  }
}

// USERS
function getUsers(){
  return JSON.parse(localStorage.getItem("users"))||{};
}
function saveUsers(u){
  localStorage.setItem("users",JSON.stringify(u));
}

// BALANCE
function add(){
  let u=getUsers();
  let id=uid.value;
  let amt=parseInt(amount.value);

  if(!u[id]) u[id]={balance:0};
  u[id].balance+=amt;

  saveUsers(u);
  show("Added ✅");
}

function cut(){
  let u=getUsers();
  let id=uid.value;
  let amt=parseInt(amount.value);

  if(!u[id]) return show("User not found ❌");
  u[id].balance-=amt;

  saveUsers(u);
  show("Cut Done ❌");
}

function search(){
  let u=getUsers();
  if(u[uid.value]){
    show("Balance: "+u[uid.value].balance);
  }else{
    show("User not found ❌");
  }
}

// BONUS
function sendBonus(){
  let u=getUsers();
  let id=uid.value;
  let amt=parseInt(bonusAmt.value);

  if(!u[id]) u[id]={balance:0};
  u[id].balance+=amt;

  saveUsers(u);
  show("Bonus Sent 💰");
}

function quickBonus(x){
  bonusAmt.value=x;
  sendBonus();
}

// THEMES
function theme1(){
  document.body.style.background="linear-gradient(45deg,#0f2027,#2c5364)";
}
function theme2(){
  document.body.style.background="linear-gradient(45deg,#ff512f,#dd2476)";
}
function theme3(){
  document.body.style.background="linear-gradient(45deg,#1d976c,#93f9b9)";
}

// BG UPLOAD
function bgUpload(e){
  let file=e.target.files[0];
  let reader=new FileReader();

  reader.onload=function(){
    document.body.style.background=`url(${reader.result})`;
    document.body.style.backgroundSize="cover";
  }
  reader.readAsDataURL(file);
}

// LOGOUT
function logout(){
  location.reload();
}

// MESSAGE
function show(t){
  msg.innerText=t;
  msg.style.display="block";
  setTimeout(()=>msg.style.display="none",5000);
}

</script>

</body>
</html>
