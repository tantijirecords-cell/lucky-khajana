<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(45deg, #ff512f, #dd2476);
      color: white;
      text-align: center;
    }

    .box {
      background: rgba(0,0,0,0.6);
      padding: 20px;
      border-radius: 10px;
      width: 320px;
      margin: auto;
      margin-top: 80px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      background: yellow;
      font-weight: bold;
    }

    #msg {
      margin-top: 10px;
      font-weight: bold;
      color: lime;
    }

    #panel {
      display: none;
    }
  </style>
</head>

<body>

<!-- 🔐 LOGIN BOX -->
<div class="box" id="loginBox">
  <h2>🔐 Admin Login</h2>

  <input id="adminUser" placeholder="Username">
  <input id="adminPass" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <p id="loginMsg"></p>
</div>

<!-- ⚙️ ADMIN PANEL -->
<div class="box" id="panel">
  <h2>⚙️ Admin Panel</h2>

  <p>User ID:</p>
  <input id="uid" placeholder="Enter User ID">

  <p>Amount:</p>
  <input id="amount" placeholder="Enter Amount">

  <br>

  <button onclick="add()">Add Balance</button>
  <button onclick="cut()">Cut Balance</button>

  <p id="msg"></p>
</div>

<script>

// 🔐 ADMIN LOGIN (simple hardcoded)
let ADMIN_USER = "admin";
let ADMIN_PASS = "1234";

function login() {
  let u = document.getElementById("adminUser").value;
  let p = document.getElementById("adminPass").value;

  if(u === ADMIN_USER && p === ADMIN_PASS) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("panel").style.display = "block";
  } else {
    document.getElementById("loginMsg").innerText = "❌ Wrong Login";
  }
}

// 💾 USERS DATA
let users = JSON.parse(localStorage.getItem("users")) || {};

function save() {
  localStorage.setItem("users", JSON.stringify(users));
}

// ➕ ADD
function add() {
  let uid = document.getElementById("uid").value;
  let amt = Number(document.getElementById("amount").value);

  if(users[uid]) {
    users[uid].balance += amt;
    save();
    showMsg("✅ Balance Added");
  } else {
    showMsg("❌ User Not Found");
  }
}

// ➖ CUT
function cut() {
  let uid = document.getElementById("uid").value;
  let amt = Number(document.getElementById("amount").value);

  if(users[uid]) {
    users[uid].balance -= amt;
    save();
    showMsg("⚠️ Balance Cut");
  } else {
    showMsg("❌ User Not Found");
  }
}

// ⏱️ MESSAGE 5 SEC
function showMsg(text) {
  let m = document.getElementById("msg");
  m.innerText = text;

  setTimeout(() => {
    m.innerText = "";
  }, 5000);
}

</script>

</body>
</html>
