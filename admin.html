<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  transition:0.5s;
}

/* Splash */
#splash{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:30px;
  z-index:999;
}

/* Box */
.box{
  max-width:400px;
  margin:20px auto;
  padding:20px;
  background:rgba(0,0,0,0.6);
  border-radius:15px;
}

/* Inputs */
input,button{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:8px;
}

button{
  background:#00c6ff;
  color:white;
  font-weight:bold;
}

/* Grid */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.card{
  background:rgba(255,255,255,0.1);
  padding:10px;
  border-radius:10px;
  text-align:center;
}

/* Msg */
#msg{
  position:fixed;
  top:20px;
  right:20px;
  background:green;
  padding:10px;
  display:none;
  border-radius:8px;
}
</style>

</head>

<body style="background:linear-gradient(45deg,#0f2027,#2c5364)">

<div id="splash">🎮 GAME ADMIN</div>

<!-- LOGIN -->
<div class="box" id="login" style="display:none">
  <h2>Admin Login</h2>
  <input id="user" placeholder="User ID">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- PANEL -->
<div class="box" id="panel" style="display:none">

<h2>Dashboard</h2>

<div class="grid">
  <div class="card">Today Deposit<br><span>0</span></div>
  <div class="card">Today Withdraw<br><span>0</span></div>
  <div class="card">Today Profit<br><span>0</span></div>

  <div class="card">Yesterday Deposit<br><span>0</span></div>
  <div class="card">Yesterday Withdraw<br><span>0</span></div>

  <div class="card">Pending Deposit<br><span>0</span></div>
  <div class="card">Pending Withdraw<br><span>0</span></div>

  <div class="card">Weekly Deposit<br><span>0</span></div>
  <div class="card">Weekly Withdraw<br><span>0</span></div>

  <div class="card">Monthly Deposit<br><span>0</span></div>
  <div class="card">Monthly Withdraw<br><span>0</span></div>
</div>

<hr>

<h3>User Control</h3>
<input id="uid" placeholder="User ID">
<input id="amount" placeholder="Amount">

<button onclick="add()">Add Balance</button>
<button onclick="cut()">Cut Balance</button>
<button onclick="searchUser()">Search User</button>

<hr>

<h3>Bonus System</h3>
<input id="bonusAmt" placeholder="Bonus Amount">
<input id="bonusMsg" placeholder="Message">

<button onclick="sendBonus()">Send Bonus</button>
<button onclick="quickBonus(100)">Festival Bonus</button>
<button onclick="quickBonus(50)">Event Bonus</button>
<button onclick="quickBonus(30)">Promotion Bonus</button>

<hr>

<h3>Theme</h3>
<button onclick="theme1()">Blue</button>
<button onclick="theme2()">Red</button>
<button onclick="theme3()">Green</button>

<input type="file" onchange="bgUpload(event)">

<button onclick="logout()">Logout</button>

</div>

<div id="msg"></div>

<script>

// Splash
setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  document.getElementById("login").style.display="block";
},2000);

// Login credentials
let ADMIN_USER = "8252312053";
let ADMIN_PASS = "Vikash209@";

// LOGIN FUNCTION (FIXED)
function login(){
  let u = document.getElementById("user").value.trim();
  let p = document.getElementById("pass").value.trim();

  let loginBox = document.getElementById("login");
  let panelBox = document.getElementById("panel");

  if(u !== ADMIN_USER){
    show("Wrong ID ❌");
    return;
  }

  if(p !== ADMIN_PASS){
    show("Wrong Password ❌");
    return;
  }

  loginBox.style.display="none";
  panelBox.style.display="block";
  show("Login Success ✅");
}

// LocalStorage Users
function getUsers(){
  return JSON.parse(localStorage.getItem("users")) || {};
}
function saveUsers(data){
  localStorage.setItem("users", JSON.stringify(data));
}

// Add Balance
function add(){
  let users = getUsers();
  let id = uid.value;
  let amt = parseInt(amount.value);

  if(!users[id]) users[id]={balance:0};
  users[id].balance += amt;

  saveUsers(users);
  show("Balance Added ✅");
}

// Cut Balance
function cut(){
  let users = getUsers();
  let id = uid.value;
  let amt = parseInt(amount.value);

  if(!users[id]) return show("User Not Found ❌");

  users[id].balance -= amt;
  saveUsers(users);

  show("Balance Cut ❌");
}

// Search
function searchUser(){
  let users = getUsers();

  if(users[uid.value]){
    show("Balance: " + users[uid.value].balance);
  }else{
    show("User Not Found ❌");
  }
}

// Bonus
function sendBonus(){
  let users = getUsers();
  let id = uid.value;
  let amt = parseInt(bonusAmt.value);

  if(!users[id]) users[id]={balance:0};
  users[id].balance += amt;

  saveUsers(users);
  show("Bonus Sent 💰");
}

function quickBonus(x){
  bonusAmt.value = x;
  sendBonus();
}

// Theme
function theme1(){
  document.body.style.background="linear-gradient(45deg,#0f2027,#2c5364)";
}
function theme2(){
  document.body.style.background="linear-gradient(45deg,#ff512f,#dd2476)";
}
function theme3(){
  document.body.style.background="linear-gradient(45deg,#1d976c,#93f9b9)";
}

// Upload BG
function bgUpload(e){
  let file = e.target.files[0];
  let reader = new FileReader();

  reader.onload = function(){
    document.body.style.background = `url(${reader.result})`;
    document.body.style.backgroundSize="cover";
  }
  reader.readAsDataURL(file);
}

// Logout
function logout(){
  location.reload();
}

// Message
function show(text){
  let m = document.getElementById("msg");
  m.innerText = text;
  m.style.display="block";

  setTimeout(()=>{
    m.style.display="none";
  },5000);
}

</script>

</body>
</html>
