<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body{
  font-family: Arial;
  background: linear-gradient(45deg,#1e3c72,#2a5298);
  color:white;
  text-align:center;
}

.box{
  background: rgba(0,0,0,0.6);
  padding:20px;
  margin:20px auto;
  width:300px;
  border-radius:10px;
}

input,button{
  padding:10px;
  margin:5px;
  width:90%;
  border:none;
  border-radius:5px;
}

button{
  background:#00c9ff;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

#panel{display:none;}

#msg{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:green;
  padding:10px 20px;
  border-radius:5px;
  display:none;
}

/* COLOR THEMES */
.theme1{background: linear-gradient(45deg,#1e3c72,#2a5298);}
.theme2{background: linear-gradient(45deg,#ff512f,#dd2476);}
.theme3{background: linear-gradient(45deg,#11998e,#38ef7d);}
.theme4{background: linear-gradient(45deg,#fc466b,#3f5efb);}
</style>

</head>
<body class="theme1">

<div id="msg"></div>

<!-- LOGIN -->
<div class="box" id="loginBox">
<h2>Admin Login</h2>
<input id="id" placeholder="Admin ID">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- PANEL -->
<div id="panel">

<div class="box">
<h2>Admin Panel</h2>

<input id="userid" placeholder="User ID">
<input id="amount" type="number" placeholder="Amount">

<button onclick="add()">Add Balance</button>
<button onclick="cut()">Cut Balance</button>
</div>

<div class="box">
<h3>🎨 Change Theme</h3>
<button onclick="setTheme('theme1')">Blue</button>
<button onclick="setTheme('theme2')">Red</button>
<button onclick="setTheme('theme3')">Green</button>
<button onclick="setTheme('theme4')">Mix</button>
</div>

<button onclick="logout()">Logout</button>

</div>

<script>

// 🔐 LOGIN DETAILS
let ADMIN_USER = "8252312053";
let ADMIN_PASS = "Vikash209@";

function login(){
  let id=document.getElementById("id").value;
  let pass=document.getElementById("pass").value;

  if(id===ADMIN_USER && pass===ADMIN_PASS){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("panel").style.display="block";
  }else{
    showMsg("❌ Wrong Login","red");
  }
}

// 💰 BALANCE SYSTEM
function add(){
  let uid=document.getElementById("userid").value;
  let amt=parseInt(document.getElementById("amount").value);

  let users=JSON.parse(localStorage.getItem("users"))||{};

  if(!users[uid]){
    users[uid]={balance:0};
  }

  users[uid].balance+=amt;

  localStorage.setItem("users",JSON.stringify(users));

  showMsg("✅ Balance Added","green");
}

function cut(){
  let uid=document.getElementById("userid").value;
  let amt=parseInt(document.getElementById("amount").value);

  let users=JSON.parse(localStorage.getItem("users"))||{};

  if(users[uid]){
    users[uid].balance-=amt;
    localStorage.setItem("users",JSON.stringify(users));
    showMsg("⚠ Balance Cut","orange");
  }else{
    showMsg("User Not Found","red");
  }
}

// 🎨 THEME CHANGE
function setTheme(t){
  document.body.className=t;
  localStorage.setItem("theme",t);
}

// 🔁 LOAD THEME
window.onload=function(){
  let t=localStorage.getItem("theme");
  if(t){document.body.className=t;}
}

// 📢 MESSAGE (5 sec)
function showMsg(text,color){
  let m=document.getElementById("msg");
  m.innerText=text;
  m.style.background=color;
  m.style.display="block";

  setTimeout(()=>{m.style.display="none";},5000);
}

// 🚪 LOGOUT
function logout(){
  location.reload();
}

</script>

</body>
</html>
